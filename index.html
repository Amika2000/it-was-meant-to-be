<!DOCTYPE html>
<html> 
<head>
<meta charset="UTF-8">
<title>Find Your Table</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet"> 

<style>

body {
  margin: 0;
  height: 100svh;
  overflow: hidden;

  position: relative;
  
  font-family: 'Lora', serif;
  color: #000;
  font-display: swap;

  background: url("background.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* soft overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.6);
  z-index: 0;
}

/* main container */
.container {
  position: relative;   /* stabilizes layout */
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  padding: 0 20px;
  padding-top: 40px;
  text-align: center;
}

.content {
  transform: translateY(-100px);
  opacity: 0;

  animation: fadeIn 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
  
/* title */
.title {
  position: absolute;
  top: 60px;
  left: 25px;

  font-family: 'Playfair Display', serif;
  font-size: 90px;
  font-weight: 500;
  line-height: 1;

  opacity: 0;
  transform: translateY(20px);

  animation: fadeInTitle 1.6s ease forwards;
  animation-delay: 0.3s;   /* 🔑 slight delay */
}

.title span {
  font-size: 30px;
  letter-spacing: 4px;
  display: block;
  margin-bottom: 6px;
}

/* subtitle */
.subtitle {
  font-size: 25px;
  line-height: 1.8;
  max-width: 90vw;
  margin-top: 20px;
  margin-bottom: 25px;
}

/* input */
input {
  width: 280px;
  padding: 14px 16px;
  margin-top: 30px;
  border: 1px solid rgba(0,0,0,0.3);
  background: rgba(255,255,255,0.6);
  font-family: 'Lora', serif;
  font-size: 25px;
  outline: none;

  transition: all 0.3s ease;
}

input:focus {
  border-color: #000;
  background: rgba(255,255,255,0.8);
}

input::placeholder {
  color: rgba(0,0,0,0.5);
}

/* place card result */
.result-card {
  display: block;
  margin: 20px auto 0 auto;
  margin-top: 30px;
  padding: 14px 20px;

  background: rgba(255,255,255,0.75);
  border: 1px solid rgba(0,0,0,0.2);

  font-family: 'Playfair Display', serif;

  width: fit-content;               /* 🔑 shrink to content */
  max-width: 80%;            /* keeps it responsive */

  opacity: 0;
  transform: translateY(15px) scale(0.98);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);

  transition: 
  opacity 0.6s ease,
  transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.result-card.show {
  opacity: 1;
  transform: translateY(0);
}

.result-name {
  font-size: 22px;
  letter-spacing: 1px;
  text-transform: capitalize;
}

.result-table {
  margin-top: 8px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* fade animation */
@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInTitle {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
  
</style>
</head>

<body>

<div class="container">

  <h1 class="title">
    <span>THE</span>
    Grand Finale
  </h1>

  <div class="content">   <!-- ✅ NEW -->

    <p class="subtitle">
      To help you find your seat, kindly enter your name below.
    </p>

    <input type="text" id="search" placeholder="Enter your name here">

    <div class="result-card" id="resultCard">
      <div class="result-name" id="resultName"></div>
      <div class="result-table" id="resultTable"></div>
    </div>

  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

fetch("Ayushwari & Yash Seating Chart.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet);

  const guests = rows.map(r => ({
    name: r.Name.toLowerCase(),
    table: r.Table
  }));

  const input = document.getElementById("search");
  const card = document.getElementById("resultCard");
  const nameEl = document.getElementById("resultName");
  const tableEl = document.getElementById("resultTable");

  input.addEventListener("input", function(e) {

    const value = e.target.value.toLowerCase();

    const match = guests.find(g => g.name.includes(value));

    if(match && value.length > 1){

      nameEl.innerHTML = match.name;
      tableEl.innerHTML = "TABLE " + match.table;

      card.classList.add("show");

    } else if(value.length > 1){

      nameEl.innerHTML = "Name not found";
      tableEl.innerHTML = "";

      card.classList.add("show");

    } else {
      card.classList.remove("show");
    }

  });

});
</script>

</body>
</html>
