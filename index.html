<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Find Your Table</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #ffffff;
  font-family: 'Libre Baskerville', serif;
  text-align: center;
  color: #000;
  animation: fadeIn 1.5s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 80px 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 18px;
  line-height: 1.7;
  margin-bottom: 50px;
}

input {
  width: 320px;
  max-width: 90%;
  padding: 15px;
  font-size: 18px;
  border: 1px solid black;
  outline: none;
  font-family: 'Libre Baskerville', serif;
}

.result {
  margin-top: 40px;
  font-size: 24px;
  font-family: 'Playfair Display', serif;
}

.footer {
  margin-top: 80px;
  font-size: 14px;
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>It Was Meant To Be</h1>

<p class="subtitle">
Welcome to Ayushwari &amp; Yash’s wedding day. Your presence makes this celebration even more special.
<br><br>
To locate your table, please search for your name below.
<br><br>
We hope you enjoy celebrating this beautiful moment with us.
</p>

<input type="text" id="search" placeholder="Enter your name here">

<div class="result" id="result"></div>

<div class="footer">
Thank you for being part of our special day
</div>

</div>

<script>

fetch("Ayushwari & Yash Seating Chart.xlsx")
.then(response => response.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  const guests = rows.map(row => {
    const [name, table] = row.split(",");
    return {
      name: name.toLowerCase(),
      table: table
    };
  });

  document.getElementById("search").addEventListener("input", function(e) {

    const value = e.target.value.toLowerCase().trim();

    if(value.length < 2){
      document.getElementById("result").innerHTML = "";
      return;
    }

    const match = guests.find(g => g.name.includes(value));

    if(match){
      document.getElementById("result").innerHTML =
        match.name.toUpperCase() + "<br>Table " + match.table;
    } else {
      document.getElementById("result").innerHTML = "Name not found";
    }

  });

});

</script>

</body>
</html>
