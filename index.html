<!DOCTYPE html>
<html> 
<head>
<meta charset="UTF-8">
  
<title>Find Your Table</title>


<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Lora:wght@400;500&family=Calibri&display=swap" rel="stylesheet"> 

<style>
body {
  margin: 0;
  min-height: 100vh;   /* instead of height: 100vh */
  overflow: hidden;   /* 🔑 stops scrolling */
  
  font-family: 'Lora', serif;
  text-align: center;
  color: #000;
  

  display: flex;
  align-items: center;     /* vertical centre of text */
  justify-content: center; /* horizontal centre */

  background: url("background.png") no-repeat center center fixed;
  background-size: cover;
}

body::before {                     /*for transparent screen at top */
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 130%;
  background: rgba(255, 255, 255, 0.75);  /* change 0.7 to control transparency */
  z-index: -1;
  
}

.container {
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;   /* vertical centering */
  align-items: center;       /* horizontal centering */

  padding: 0 20px;
  text-align: center;
}

.title {
  position: absolute;
  top: 40px;
  left: 40px;
  text-align: left;
  font-family: 'Playfair Display', serif;
  line-height: 1.1;
}

.title span {
  font-size: 300px;   /* smaller "The" */
  letter-spacing: 2px;
}

.title br + text,
.title {
  font-size: 60px;   /* bigger "Grand Finale" */
}
  
.subtitle {
  font-size: 35px;
  line-height: 1.7;
  margin-top: 30px;
  margin-bottom: 40px;
}  
  
input {
  width: 320px;
  max-width: 90%;
  padding: 15px;
  font-size: 30px;
  border: 1px solid black;
}

.result {
  margin-top: 40px;
  font-size: 35px;
  font-family: 'Calibri', serif;
  text-transform: capitalize;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">
  <span>The</span><br>
  Grand Finale
</h1>

<p class="subtitle">
<br><br>
To help you find your seat, kindly enter your name below.
<br><br>
</p>

<input type="text" id="search" placeholder="Enter your name here">

<div class="result" id="result"></div>

<div class="result" id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

fetch("Ayushwari & Yash Seating Chart.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet);

  const guests = rows.map(r => ({
    name: r.Name.toLowerCase(),
    table: r.Table
  }));

  document.getElementById("search").addEventListener("input", function(e) {

    const value = e.target.value.toLowerCase();

    const match = guests.find(g => g.name.includes(value));

    if(match){
      document.getElementById("result").innerHTML =
        match.name + "<br>Table " + match.table;
    } else {
      document.getElementById("result").innerHTML = "Name not found";
    }

  });

});
</script>

</body>
</html>
